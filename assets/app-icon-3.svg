<svg xmlns="http://www.w3.org/2000/svg" viewBox="258 246.5 536 536">
  <!-- SDXC-kort (blått, med avskuret hörn uppe till höger) -->
  <path fill="#1E3AA5" d="M 290 265
    h 165
    l 65 65
    v 255
    a 30 30 0 0 1 -30 30
    h -200
    a 30 30 0 0 1 -30 -30
    v -290
    a 30 30 0 0 1 30 -30 z"/>
  <!-- Liten kontakt på kortets högersida -->
  <line x1="510" y1="518" x2="552" y2="518" stroke="#1E3AA5" stroke-width="26" stroke-linecap="round"/>
  <!-- Fotoruta på kortet -->
  <rect x="288" y="322" width="192" height="136" rx="14" fill="#FFFFFF"/>
  <circle cx="416" cy="366" r="17" fill="#1E3AA5"/>
  <path fill="#1E3AA5" d="M 302 444 L 360 380 L 402 424 L 424 402 L 466 444 Z"/>
  <!-- Textrader på kortet -->
  <line x1="300" y1="502" x2="420" y2="502" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round"/>
  <line x1="300" y1="548" x2="368" y2="548" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round"/>
  <line x1="404" y1="548" x2="452" y2="548" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round"/>
  <line x1="300" y1="594" x2="352" y2="594" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round"/>
  <!-- Mapp/back (blå kontur, öppen upptill för pilen) -->
  <path fill="none" stroke="#1E3AA5" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"
        d="M 700 510 h 45 a 32 32 0 0 1 32 32 v 175 a 32 32 0 0 1 -32 32 h -258 a 32 32 0 0 1 -32 -32 v -175"/>
  <path fill="none" stroke="#1E3AA5" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"
